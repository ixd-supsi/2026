<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ES02 - p5js</title>
	<style>
		body {
			margin: 0;
		}
		canvas {
			display: block;
		}
	</style>
</head>
<body>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
	<script>

		let moscaX = 200
		let moscaY = 200

		function setup() {
			createCanvas(windowWidth, windowHeight)
		}

		function draw() {
			background(255, 0, 0)

			// ciotola
			stroke(0)
			fill(255)
			rect(140, 140, 100, 100)
			ellipse(200, 200, 50, 50)
			line(120, 150, 250, 250)
			line(180, 120, 250, 240)

			// mosca
			fill(0)
			noStroke()
			ellipse(moscaX, moscaY, 5, 5)

			moscaX = moscaX + random(-2, 2)
			moscaY = moscaY + random(-2, 2)

		}

		function windowResized() {
			resizeCanvas(windowWidth, windowHeight);
		}

	</script>
</body>
</html>
