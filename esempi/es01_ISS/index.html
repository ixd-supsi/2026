<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ES01 - ISS</title>
</head>
<body>

	<script>
		const API_URL = "http://api.open-notify.org/astros.json"
		fetch(API_URL)
		.then( r => r.json())
		.then( data => {
			const n = data.number
			document.body.innerHTML = `Ci sono ${n} astronauti in orbita attualmente:<br>`
			data.people.forEach( a => {
				document.body.innerHTML += a.name + " 🚀 " + a.craft + "<br>"
			})
		})
	</script>

</body>
</html>
